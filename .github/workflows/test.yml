name: Test

on:
  workflow_call:
    inputs:
      electron-version:
        required: true
        type: string
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * 1-5'
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        node-version:
          - '25.0.0'
          - '24.10.0'
          - '22.20.0'
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    runs-on: "${{ matrix.os }}"
    steps:
      - run: git config --global core.autocrlf input
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Use Node.js ${{ matrix.node-version }}"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "${{ matrix.node-version }}"
      - name: Update Version
        if: ${{ inputs.electron-version != '' }}
        env:
          VERSION: ${{ inputs.electron-version }}
        run: node script/update-version.js $VERSION
      - name: Use Latest Electron Version
        if: ${{ inputs.electron-version == '' }}
        run: echo "ELECTRON_MKSNAPSHOT_STABLE_FALLBACK=1" >> $GITHUB_ENV
      - name: Install Dependencies
        run: yarn install --immutable
      - name: Bypass crash handler (Linux)
        # The "fails for invalid JavaScript files" test deliberately feeds bad
        # JS to mksnapshot, which CHECK-fails with SIGTRAP. Ubuntu runners pipe
        # core_pattern into a crash handler that synchronously tears down the
        # 43MB binary, stalling teardown long enough to blow the test timeout.
        # Point core_pattern at a plain file name so the kernel skips the pipe
        # handler entirely.
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.core_pattern=core
      - name: Run Tests
        run: |
          node --version
          npm --version
          yarn test
